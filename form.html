<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Hero Image</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      text-align: center;
      width: 360px;
    }
    h2 { margin-bottom: 24px; }
    input[type="file"] { margin-bottom: 20px; }
    button {
      background: #000;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    #status { margin-top: 16px; font-size: 14px; color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Update Hero Image</h2>
    <form id="uploadForm">
      <input type="file" name="hero_image" accept="image/*" required><br>
      <button type="submit">Upload New Hero</button>
    </form>
    <div id="status"></div>
  </div>

  <script>
    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const status = document.getElementById('status');
      status.textContent = 'Uploading...';

      const formData = new FormData(this);
      const res = await fetch('https://hook.us2.make.com/txijaroh1eqbkddarvyw7hd6mihtrkit', {
        method: 'POST',
        body: formData
      });

      if (res.ok) {
        status.textContent = 'Done! Hero image is updating...';
      } else {
        status.textContent = 'Something went wrong. Try again.';
      }
    });
  </script>
</body>
</html>
