<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }

    .hero {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero-text {
      position: absolute;
      bottom: 60px;
      left: 60px;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .hero-text h1 { font-size: 3rem; }
    .hero-text p  { font-size: 1.2rem; margin-top: 8px; }
  </style>
</head>
<body>
  <section class="hero">
    <img id="hero-img" src="assets/images/hero.jpg" alt="Hero image">
    <div class="hero-text">
      <h1>Hello World</h1>
      <p>Update this hero with a form upload.</p>
    </div>
  </section>
</body>
</html>
